<svg xmlns="http://www.w3.org/2000/svg" width="460" height="230" viewBox="0 0 460 230" font-family="sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#333"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#1f7a3d"/>
    </marker>
  </defs>

  <text x="10" y="22" font-size="14" font-weight="bold">Poly-line rendering &#8212; bypass routed clear of nodes and labels</text>

  <!-- label band guide -->
  <rect x="30" y="112" width="360" height="24" fill="#fdeaea" stroke="none"/>
  <text x="396" y="128" font-size="10" fill="#c98a8a">label band</text>
  <!-- routing channel guide, kept below the label band -->
  <line x1="30" y1="158" x2="380" y2="158" stroke="#bbb" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="386" y="161" font-size="10" fill="#999">channel</text>

  <!-- main path edges (unchanged, straight) with labels at their midpoints -->
  <line x1="82" y1="90" x2="188" y2="90" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="232" y1="90" x2="338" y2="90" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="135" y="80" font-size="11" text-anchor="middle" fill="#333">pass</text>
  <text x="285" y="80" font-size="11" text-anchor="middle" fill="#333">pass</text>

  <!-- activities, each with the label text drawn below the icon -->
  <g>
    <circle cx="60" cy="90" r="22" fill="#dbe2ff" stroke="#4459b0" stroke-width="1.6"/>
    <text x="60" y="94" font-size="12" text-anchor="middle">X</text>
    <text x="60" y="128" font-size="11" text-anchor="middle" fill="#555">fork</text>
  </g>
  <g>
    <circle cx="210" cy="90" r="22" fill="#dbe2ff" stroke="#4459b0" stroke-width="1.6"/>
    <text x="210" y="94" font-size="12" text-anchor="middle">A</text>
    <text x="210" y="128" font-size="11" text-anchor="middle" fill="#555">branch step</text>
  </g>
  <g>
    <circle cx="360" cy="90" r="22" fill="#dbe2ff" stroke="#4459b0" stroke-width="1.6"/>
    <text x="360" y="94" font-size="12" text-anchor="middle">Y</text>
    <text x="360" y="128" font-size="11" text-anchor="middle" fill="#555">convergence</text>
  </g>

  <!-- bypass: exit X on the right, drop into the channel below the labels, run across,
       come up beside Y and enter from the lower-left (never from below through the label) -->
  <polyline points="82,90 135,90 135,158 285,158 285,102 340,99" fill="none"
            stroke="#1f7a3d" stroke-width="2.2" marker-end="url(#arrGreen)"/>
  <text x="210" y="173" font-size="11" text-anchor="middle" fill="#1f7a3d" font-weight="bold">skip</text>

  <text x="210" y="208" font-size="12" fill="#1f7a3d" text-anchor="middle">bypass runs below the label band and enters Y from the side &#8212; no node, arrow or label is crossed</text>
</svg>
